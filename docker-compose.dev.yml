services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: thienthan
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - ecommerce-pgdata:/var/lib/postgresql/data

volumes:
  ecommerce-pgdata:
